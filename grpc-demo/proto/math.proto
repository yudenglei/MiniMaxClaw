syntax = "proto3";

package math;

option csharp_namespace = "Math";

service MathService {
    // Unary RPC
    rpc Add(AddRequest) returns (AddReply);
    rpc Multiply(MultiplyRequest) returns (MultiplyReply);
    
    // Server streaming RPC
    rpc Range(RangeRequest) returns (stream RangeReply);
    
    // Client streaming RPC
    rpc Sum(stream SumRequest) returns (SumReply);
    
    // Bidirectional streaming RPC
    rpc Compute(stream ComputeRequest) returns (stream ComputeReply);
}

message AddRequest {
    int64 a = 1;
    int64 b = 2;
}

message AddReply {
    int64 result = 1;
}

message MultiplyRequest {
    int64 a = 1;
    int64 b = 2;
}

message MultiplyReply {
    int64 result = 1;
}

message RangeRequest {
    int64 start = 1;
    int64 end = 2;
}

message RangeReply {
    int64 value = 1;
}

message SumRequest {
    int64 value = 1;
}

message SumReply {
    int64 result = 1;
}

message ComputeRequest {
    enum Operation {
        ADD = 0;
        SUBTRACT = 1;
        MULTIPLY = 2;
        DIVIDE = 3;
    }
    Operation op = 1;
    int64 a = 2;
    int64 b = 3;
}

message ComputeReply {
    int64 result = 1;
    string description = 2;
}
